<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>EventHub</title>
  <style>
    body { font-family: system-ui, Arial; margin: 24px; max-width: 1100px; }
    nav a { margin-right: 12px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { text-align: left; background: #f6f6f6; }
    form { margin-top: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    input, select { padding: 8px; margin: 6px 0; width: 100%; max-width: 420px; }
    button { padding: 10px 14px; cursor: pointer; }
    .row { display: flex; gap: 24px; align-items: flex-start; }
    .col { flex: 1; }
    .muted { color: #666; }
    .ok { padding: 10px; border: 1px solid #bfe5bf; background: #f2fff2; border-radius: 8px; }
    .err { padding: 10px; border: 1px solid #f0b1b1; background: #fff2f2; border-radius: 8px; }
    .card { padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; margin: 10px 0; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/customers">Customers</a>
    <a href="/venues">Venues</a>
    <a href="/events">Events</a>
    <a href="/buy">Buy tickets</a>
    <a href="/reports">Reports</a>
    <a href="/docs">API Docs</a>
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
